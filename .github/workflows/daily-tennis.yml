name: Daily tennis robot

# Refresca daily.json cada día con cuotas de tenis (The Odds API).
# Requiere el secret ODDS_API_KEY (Settings → Secrets and variables → Actions).
# Asume que el contenido de "tennis/" está en la RAÍZ del repositorio.

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC (~09:17 Madrid). Minuto "raro": las horas
                            # en punto van saturadas y GitHub retrasa más.
  workflow_dispatch:
    inputs:
      reset:
        description: 'Vaciar historial y empezar limpio (escribe 1)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generar daily.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          APITENNIS_KEY: ${{ secrets.APITENNIS_KEY }}   # resultados + fotos (api-tennis.com)
          RESET: ${{ github.event.inputs.reset }}       # pon 1 al lanzar a mano para vaciar historial
          ODDS_SPORT: auto          # descubre torneos ATP/WTA activos
          ODDS_MAX: '6'
          ODDS_REGIONS: eu,uk       # eu (Winamax, DAZNbet, Unibet…) + uk (Bet365, Betfair, William Hill…)
          ODDS_WINDOW_HOURS: '96'   # 4 días hacia delante
        run: node robot/fetch-daily.js
      - name: Commit si hay cambios
        run: |
          git config user.name  "acevalue-bot"
          git config user.email "bot@users.noreply.github.com"
          git add daily.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: refresh daily tennis odds"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push rechazado, reintento $i…"; sleep 3
            done
          fi
